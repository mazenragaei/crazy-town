<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crazy Town Admin</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --text:#fff; --muted:#9ca3af; --line:#2a2a42; --accent:#00c2ff; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:linear-gradient(180deg,#0d1024,#0f0f23); color:var(--text); min-height:100vh; }
    .wrap { width:min(1400px,96vw); margin:18px auto; }
    .top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; position:sticky; top:10px; z-index:10; background:rgba(15,15,35,0.86); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:12px; }
    .admin-main-layout { display:grid; grid-template-columns:260px 1fr; gap:16px; align-items:start; }
    .admin-sidebar { position:sticky; top:84px; max-height:calc(100vh - 98px); overflow:auto; }
    .admin-content { min-width:0; }
    .tabs { display:flex; gap:6px; flex-direction:column; margin:10px 0; }
    .tab, .btn { border:1px solid var(--line); background:#151528; color:var(--text); padding:10px 14px; border-radius:10px; cursor:pointer; transition:all .22s; font-size:14px; }
    .tab:hover, .btn:hover { transform:translateY(-1px); border-color:#3c4568; background:#1b1b34; }
    .tab { text-align:left; width:100%; }
    .tab.active { border-color:var(--accent); color:var(--accent); background:rgba(0,194,255,0.12); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
    .pane { display:none; }
    .pane.active { display:block; }
    table { width:100%; border-collapse: collapse; min-width:800px; }
    th, td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; font-size:13px; }
    th { background:#16162d; position:sticky; top:0; }
    tr:nth-child(even) td { background:rgba(255,255,255,0.015); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; margin-top:10px; }
    input, select, textarea { width:100%; background:#121226; color:#fff; border:1px solid var(--line); border-radius:8px; padding:10px; margin:4px 0; font-size:14px; }
    .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin:10px 0; }
    .badge { padding:2px 8px; border-radius:999px; border:1px solid var(--line); font-size:11px; }
    .ok { color:var(--ok); } .warn { color:var(--warn); } .danger { color:var(--danger); }
    .small { color:var(--muted); font-size:12px; }
    .log { max-height:300px; overflow:auto; border:1px solid var(--line); border-radius:8px; padding:10px; background:#0f0f1a; }
    .search-wrap { position:relative; }
    #adminSearchResults { position:absolute; top:calc(100% + 6px); left:0; right:0; background:#121226; border:1px solid var(--line); border-radius:12px; max-height:280px; overflow:auto; z-index:20; display:none; }
    .search-item { padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; font-size:14px; }
    .search-item:last-child { border-bottom:none; }
    .search-item:hover { background:#1b1b33; }
    .search-item .small { display:block; margin-top:2px; }
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100; display:none; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:#1a1a2e; border:1px solid var(--line); border-radius:16px; padding:24px; width:min(500px,90vw); }
    .modal h3 { margin:0 0 16px; color:var(--accent); }
    .modal-actions { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }
    @media (max-width: 980px) { .admin-main-layout { grid-template-columns:1fr; } .admin-sidebar { position:relative; top:0; } }
    .toast { position:fixed; top:20px; right:20px; padding:12px 20px; background:#1a1a2e; border:1px solid var(--accent); border-radius:10px; color:#fff; z-index:9999; animation:slideIn .3s; }
    @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
    .form-section { background:#121226; border:1px solid var(--line); border-radius:10px; padding:16px; margin:10px 0; }
    .form-section h4 { margin:0 0 12px; color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 style="margin:0;font-size:1.4rem;">Admin Control Center</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <button class="btn" onclick="goBack()">&#8592; Back</button>
        <button class="btn" onclick="goHome()">Main Site</button>
        <button class="btn" onclick="exportBackup()">Export Backup</button>
      </div>
    </div>
    <div class="admin-main-layout">
      <aside class="admin-sidebar">
        <div class="card" style="padding:12px;">
          <input id="adminGlobalSearch" type="search" placeholder="Search..." oninput="handleSearch()" style="margin:0;">
          <div id="adminSearchResults"></div>
        </div>
        <div class="tabs" id="tabs"></div>
      </aside>
      <div class="admin-content">
        <div class="grid" id="statsGrid"></div>
        <div id="paneContent"></div>
      </div>
    </div>
  </div>
  <div id="toastContainer"></div>
  <div id="modalContainer"></div>
  <script type="module">
    import { supabase, getCurrentUser, getKV, setKV, getUsers, saveUsers, loginUser, registerUser } from './db.js';

    const DB_KEYS = {
      users: 'crazyTown_users', bookings: 'crazyTown_bookings', orders: 'crazyTown_orders',
      leaderboard: 'crazyTown_leaderboard', activity: 'crazyTown_activity', coupons: 'crazyTown_coupons',
      inventory: 'crazyTown_inventory', news: 'crazyTown_news', teams: 'crazyTown_teams',
      tournaments: 'crazyTown_tournaments', settings: 'crazyTown_settings', cart: 'crazyTown_cart',
      chat: 'crazyTown_chat', bookings2: 'crazyTown_bookings',
      tournamentChampions: 'crazyTown_tournamentChampions',
      topPlayers: 'crazyTown_topPlayers',
      eliteTeams: 'crazyTown_eliteTeams'
    };

    function hasRole(u, r) { return u && Array.isArray(u.roles) && u.roles.includes(r); }
    function isAdmin(u) { return hasRole(u,'admin') || hasRole(u,'owner') || hasRole(u,'co-owner') || hasRole(u,'ceo'); }
    function showToast(msg, type='info') {
      const el = document.createElement('div');
      el.className = 'toast';
      el.style.borderColor = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#00c2ff';
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    function goBack() { window.history.back(); }
    function goHome() { window.location.href = 'index.html'; }

    // Client-side cache to speed up page loads on back navigation
    const DATA_CACHE = { data: null, timestamp: 0, TTL: 5000 }; // 5s cache (faster fresh data)
    const pendingLoads = new Map(); // prevent duplicate concurrent loads

    async function loadAllData(useCache = true) {
      const now = Date.now();
      // Return cached data if fresh (within 30s) and already loaded
      if (useCache && DATA_CACHE.data && (now - DATA_CACHE.timestamp) < DATA_CACHE.TTL) {
        return DATA_CACHE.data;
      }

      // Deduplicate concurrent requests
      const cacheKey = 'adminData';
      if (pendingLoads.has(cacheKey)) {
        return pendingLoads.get(cacheKey);
      }

      const loadPromise = (async () => {
        const keys = Object.values(DB_KEYS);
        const data = {};
        // Load all in parallel using Promise.all for speed
        const results = await Promise.all(keys.map(k => getKV(k, k.includes('Town') ? [] : null).then(v => [k, v])));
        results.forEach(([k, v]) => { data[k] = v; });
        DATA_CACHE.data = data;
        DATA_CACHE.timestamp = now;
        pendingLoads.delete(cacheKey);
        return data;
      })();

      pendingLoads.set(cacheKey, loadPromise);
      return loadPromise;
    }

    function invalidateCache() {
      DATA_CACHE.data = null;
      DATA_CACHE.timestamp = 0;
    }

    // Auto-invalidate cache on storage changes (cross-tab sync)
    window.addEventListener('storage', (e) => {
      if (e.key && Object.values(DB_KEYS).includes(e.key)) {
        invalidateCache();
      }
    });

    // Also invalidate on online event (came back from offline)
    window.addEventListener('online', () => { invalidateCache(); });

    function renderStats(data) {
      const users = Array.isArray(data[DB_KEYS.users]) ? data[DB_KEYS.users] : [];
      const bookings = Array.isArray(data[DB_KEYS.bookings]) ? data[DB_KEYS.bookings] : [];
      const orders = Array.isArray(data[DB_KEYS.orders]) ? data[DB_KEYS.orders] : [];
      const revenue = [...bookings, ...orders].reduce((s, b) => s + Number(b.price || 0), 0);
      const vipCount = users.filter(u => hasRole(u,'vip') || hasRole(u,'elite') || hasRole(u,'champion')).length;
      document.getElementById('statsGrid').innerHTML = `
        <div class="card"><div class="small">Total Revenue</div><h2 style="margin:8px 0 0">${revenue.toFixed(0)} EGP</h2></div>
        <div class="card"><div class="small">Total Users</div><h2 style="margin:8px 0 0">${users.length}</h2></div>
        <div class="card"><div class="small">Bookings</div><h2 style="margin:8px 0 0">${bookings.length}</h2></div>
        <div class="card"><div class="small">Shop Orders</div><h2 style="margin:8px 0 0">${orders.length}</h2></div>
        <div class="card"><div class="small">VIP Users</div><h2 style="margin:8px 0 0">${vipCount}</h2></div>
        <div class="card"><div class="small">Admins</div><h2 style="margin:8px 0 0">${users.filter(u => isAdmin(u)).length}</h2></div>
      `;
    }

    function renderPanes(data) {
      const tabs = [
        {id:'insights', label:'Insights', icon:'&#128200;'},
        {id:'bookings', label:'Bookings', icon:'&#128197;'},
        {id:'orders', label:'Order History', icon:'&#128722;'},
        {id:'users', label:'Users', icon:'&#128101;'},
        {id:'team', label:'Team Control', icon:'&#129309;'},
        {id:'leaderboard', label:'Leaderboard', icon:'&#127941;'},
        {id:'commerce', label:'Commerce', icon:'&#128188;'},
        {id:'coupons', label:'Coupons', icon:'&#128179;'},
        {id:'tournaments', label:'Tournaments', icon:'&#127942;'},
        {id:'operations', label:'Operations', icon:'&#9881;'},
        {id:'customers', label:'Customers', icon:'&#128079;'},
        {id:'export', label:'Card Export', icon:'&#128204;'},
        {id:'news', label:'News', icon:'&#128240;'},
        {id:'support', label:'Support', icon:'&#128172;'},
        {id:'activity', label:'Activity', icon:'&#128221;'}
      ];

      document.getElementById('tabs').innerHTML = tabs.map(t =>
        `<button class="tab" onclick="switchPane('${t.id}')" data-tab="${t.id}">${t.icon} ${t.label}</button>`
      ).join('');

      window.allData = data;
      switchPane('insights');
    }

    function switchPane(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
      const data = window.allData;
      const d = {
        users: Array.isArray(data[DB_KEYS.users]) ? data[DB_KEYS.users] : [],
        bookings: Array.isArray(data[DB_KEYS.bookings]) ? data[DB_KEYS.bookings] : [],
        bookings2: Array.isArray(data[DB_KEYS.bookings2]) ? data[DB_KEYS.bookings2] : [],
        orders: Array.isArray(data[DB_KEYS.orders]) ? data[DB_KEYS.orders] : [],
        leaderboard: Array.isArray(data[DB_KEYS.leaderboard]) ? data[DB_KEYS.leaderboard] : [],
        activity: Array.isArray(data[DB_KEYS.activity]) ? data[DB_KEYS.activity] : [],
        coupons: Array.isArray(data[DB_KEYS.coupons]) ? data[DB_KEYS.coupons] : [],
        inventory: Array.isArray(data[DB_KEYS.inventory]) ? data[DB_KEYS.inventory] : [],
        news: Array.isArray(data[DB_KEYS.news]) ? data[DB_KEYS.news] : [],
        teams: Array.isArray(data[DB_KEYS.teams]) ? data[DB_KEYS.teams] : [],
        tournaments: Array.isArray(data[DB_KEYS.tournaments]) ? data[DB_KEYS.tournaments] : [],
        chat: Array.isArray(data[DB_KEYS.chat]) ? data[DB_KEYS.chat] : [],
        settings: data[DB_KEYS.settings] || {}
      };

      let html = '';
      switch(id) {
        case 'insights':
          const pendingBookings = d.bookings.filter(b => b.status === 'Pending').length;
          const confirmedBookings = d.bookings.filter(b => b.status === 'Confirmed').length;
          const pendingOrders = d.orders.filter(o => o.status === 'Pending Confirmation').length;
          const lowStock = d.inventory.filter(i => (i.qty || 0) < 5).length;
          const totalRevenue = [...d.bookings, ...d.orders].reduce((s,b) => s + Number(b.price||b.total||0), 0);
          const vipUsers = d.users.filter(u => u.roles?.includes('vip') || u.roles?.includes('elite') || u.roles?.includes('champion')).length;
          const activeUsers = d.users.filter(u => !u.isBanned).length;
          const bannedUsers = d.users.filter(u => u.isBanned).length;
          const todayBookings = d.bookings.filter(b => b.date === new Date().toISOString().slice(0,10)).length;
          html = `<div class="card"><h3 style="margin-bottom:16px;">📊 Command Center Insights</h3>
            <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
              <div class="card" style="border:1px solid #22c55e33;"><div class="small">Total Revenue</div><h2 style="margin:4px 0 0;color:#22c55e;">${totalRevenue.toFixed(0)} EGP</h2></div>
              <div class="card" style="border:1px solid #00c2ff33;"><div class="small">Total Users</div><h2 style="margin:4px 0 0;">${d.users.length}</h2><div class="small">${activeUsers} active, ${bannedUsers} banned</div></div>
              <div class="card" style="border:1px solid #9d4edd33;"><div class="small">VIP/Elite/Champion</div><h2 style="margin:4px 0 0;color:#9d4edd;">${vipUsers}</h2></div>
              <div class="card" style="border:1px solid #22c55e33;"><div class="small">Confirmed Missions</div><h2 style="margin:4px 0 0;color:#22c55e;">${confirmedBookings}</h2></div>
              <div class="card" style="border:1px solid #f59e0b33;"><div class="small">Pending Missions</div><h2 style="margin:4px 0 0;color:#f59e0b;">${pendingBookings}</h2></div>
              <div class="card" style="border:1px solid #ef444433;"><div class="small">Today's Missions</div><h2 style="margin:4px 0 0;color:#ef4444;">${todayBookings}</h2></div>
              <div class="card" style="border:1px solid #ffd70033;"><div class="small">Pending Orders</div><h2 style="margin:4px 0 0;color:#ffd700;">${pendingOrders}</h2></div>
              <div class="card" style="border:1px solid #ef444433;"><div class="small">Low Stock Items</div><h2 style="margin:4px 0 0;">${lowStock}</h2></div>
              <div class="card" style="border:1px solid #22c55e33;"><div class="small">Active Teams</div><h2 style="margin:4px 0 0;">${d.teams.length}</h2></div>
              <div class="card" style="border:1px solid #00c2ff33;"><div class="small">Tournaments</div><h2 style="margin:4px 0 0;">${d.tournaments.length}</h2></div>
              <div class="card" style="border:1px solid #9d4edd33;"><div class="small">News Articles</div><h2 style="margin:4px 0 0;">${d.news.length}</h2></div>
              <div class="card" style="border:1px solid #ffd70033;"><div class="small">Active Coupons</div><h2 style="margin:4px 0 0;">${d.coupons.filter(c=>c.active).length}</h2></div>
            </div>
            ${lowStock > 0 ? `<div style="margin-top:12px;padding:10px;background:#3b1a0a;border:1px solid #ef4444;border-radius:8px;color:#ef4444;">⚠️ <strong>${lowStock}</strong> items are running low on stock. <button class="btn" onclick="switchPane('commerce')">Restock Now</button></div>` : ''}
          </div>`;
          break;
        case 'bookings':
          const confirmedCount = d.bookings.filter(b=>b.status==='Confirmed').length;
          const pendingCount = d.bookings.filter(b=>b.status==='Pending').length;
          html = `<div class="card"><h3>Bookings & Missions</h3>
            <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              <div class="card" style="padding:8px 14px;border-color:#22c55e33;"><span style="color:#22c55e;">●</span> Confirmed: <strong>${confirmedCount}</strong></div>
              <div class="card" style="padding:8px 14px;border-color:#f59e0b33;"><span style="color:#f59e0b;">●</span> Pending: <strong>${pendingCount}</strong></div>
              <button class="btn" onclick="openAddMissionModal()" style="background:var(--accent);color:#000;margin-left:auto;">+ New Booking</button>
              <button class="btn" onclick="exportBookingsCSV()">Export CSV</button>
            </div>
            <div class="table-wrap"><table><thead><tr><th>Ticket</th><th>Name</th><th>Phone</th><th>Date</th><th>Time</th><th>Slot</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>
            ${d.bookings.length ? d.bookings.map(b => `<tr>
              <td><code style="background:#1a1a2e;padding:2px 6px;border-radius:4px;">${b.ticketId||'-'}</code></td>
              <td><strong>${b.name||'-'}</strong></td>
              <td>${b.phone||'-'}</td>
              <td>${b.date||'-'}</td>
              <td>${b.time||'-'}</td>
              <td>#${b.playerNo||'-'}</td>
              <td style="color:#22c55e;">${Number(b.price||0).toFixed(0)} EGP</td>
              <td><span class="badge ${b.status==='Confirmed'?'ok':'warn'}">${b.status||'Pending'}</span></td>
              <td>
                <button class="btn" onclick="toggleBooking('${b.id}')">${b.status==='Confirmed'?'Pending':'Confirm'}</button>
                <button class="btn" onclick="openEditBookingModal('${b.id}')">Edit</button>
                <button class="btn" onclick="deleteBooking('${b.id}')" style="color:#ef4444;">Del</button>
              </td>
            </tr>`).join('') : '<tr><td colspan="9">No bookings found</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'orders':
          html = `<div class="card"><h3>Order History</h3>
            <div class="table-wrap"><table><thead><tr><th>Order ID</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>
            ${d.orders.length ? d.orders.map(o => `<tr><td>${o.id || '-'}</td><td>${o.items?.length || 0}</td><td>${Number(o.total||0).toFixed(0)} EGP</td><td><span class="badge warn">${o.status || '-'}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('') : '<tr><td colspan="5">No orders</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'users':
          html = `<div class="card"><h3>Users <button class="btn" onclick="openAddUserModal()" style="float:right;margin-top:-8px;">+ Add User</button></h3>
            <div style="margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              <input type="search" id="userSearchBox" placeholder="Search users..." oninput="filterUserTable(this.value)" style="max-width:220px;">
              <select id="userRoleFilter" onchange="filterUserTable('')" style="max-width:150px;">
                <option value="">All Roles</option>
                <option value="vip">VIP</option>
                <option value="elite">Elite</option>
                <option value="champion">Champion</option>
                <option value="player">Player</option>
              </select>
              <button class="btn" onclick="bulkPromoteUsers()">Bulk Promote</button>
            </div>
            <div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Role/Rank</th><th>Balance</th><th>Status</th><th>Quick Actions</th></tr></thead><tbody id="usersTableBody">
            ${d.users.map(u => {
              const roles = Array.isArray(u.roles) ? u.roles : [];
              const isVip = roles.includes('vip');
              const isElite = roles.includes('elite');
              const isChampion = roles.includes('champion');
              const roleLabel = roles.length ? roles.join('/') : (u.rank||'Recruit');
              const roleStyle = isElite ? 'border-color:#9d4edd;color:#9d4edd;' : isVip ? 'border-color:#ffd700;color:#ffd700;' : isChampion ? 'border-color:#ef4444;color:#ef4444;' : '';
              return `<tr>
                <td><strong>${u.name||'-'}</strong> ${u.isBanned?'<span class="danger">[Banned]</span>':''}</td>
                <td>${u.email||'-'}</td>
                <td><span class="badge" style="${roleStyle}">${roleLabel}</span></td>
                <td>${Number(u.balance||0).toFixed(0)}</td>
                <td>${u.isBanned?'<span class="danger">Banned</span>':'<span class="ok">Active</span>'}</td>
                <td>
                  <button class="btn" onclick="toggleUserRole('${u.id}','vip')" style="${isVip?'background:#ffd700;color:#000;border-color:#ffd700;':''}" title="Toggle VIP">VIP</button>
                  <button class="btn" onclick="toggleUserRole('${u.id}','elite')" style="${isElite?'background:#9d4edd;color:#fff;border-color:#9d4edd;':''}" title="Toggle Elite">ELT</button>
                  <button class="btn" onclick="toggleUserRole('${u.id}','champion')" style="${isChampion?'background:#ef4444;color:#fff;border-color:#ef4444;':''}" title="Toggle Champion">CHP</button>
                  <button class="btn" onclick="toggleAdmin('${u.id}')">${isAdmin(u)?'✕ADM':'+ADM'}</button>
                  <button class="btn" onclick="openEditUserModal('${u.id}')">Edit</button>
                  <button class="btn" onclick="adjustBalance('${u.id}')">$</button>
                  <button class="btn" onclick="toggleBan('${u.id}')">${u.isBanned?'Unban':'Ban'}</button>
                </td>
              </tr>`;
            }).join('')}
            </tbody></table></div></div>`;
          break;
        case 'team':
          html = `<div class="card"><h3>Team Control</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="switchPane('operations')" style="background:#1b1b34;">View Operations</button></div>
            <div class="table-wrap"><table><thead><tr><th>Name</th><th>Leader</th><th>Members</th><th>Tournament</th><th>Status</th><th>Actions</th></tr></thead><tbody>
            ${d.teams.length ? d.teams.map(t => `<tr><td><strong>${t.name||'-'}</strong></td><td>${t.leader||'-'}</td><td>${t.members?.length||0}</td><td>${t.tournament?'<span class="badge ok">'+t.tournament+'</span>':'-'}</td><td><span class="badge ${t.status==='active'?'ok':'warn'}">${t.status||'active'}</span></td><td>
              <button class="btn" onclick="editTeam('${t.id}')">Edit</button>
              <button class="btn" onclick="disbandTeam('${t.id}')" style="color:#ef4444;">Disband</button>
            </td></tr>`).join('') : '<tr><td colspan="6">No teams registered</td></tr>'}
            </tbody></table></div></div>`;

    async function executeSyncLeaderboard() {
      const mode = document.getElementById('syncMode').value;
      const merge = document.getElementById('syncMerge').checked;
      let users = await getKV(DB_KEYS.users, []);
      users = users.filter(u => !u.isBanned);
      let lb = [];
      if (merge) lb = [...(window.allData[DB_KEYS.leaderboard] || [])];
      let newEntries = [];
      if (mode === 'bookings') {
        const bookings = await getKV(DB_KEYS.bookings, []);
        const counts = {};
        bookings.forEach(b => { counts[b.userId || b.email] = (counts[b.userId || b.email] || 0) + 1; });
        const top = users.map(u => ({ ...u, _score: counts[u.id] || counts[u.email] || 0 })).sort((a,b) => b._score - a._score).slice(0, 20);
        newEntries = top.map(u => ({ id: u.id, name: u.name, tag: u.email, points: u._score * 100, kills: 0, wins: 0, color: 'primary' }));
      } else if (mode === 'balance') {
        const top = [...users].sort((a,b) => (b.balance||0) - (a.balance||0)).slice(0,20);
        newEntries = top.map(u => ({ id: u.id, name: u.name, tag: u.email, points: Math.round(u.balance||0), kills: 0, wins: 0, color: 'primary' }));
      } else {
        newEntries = users.map(u => ({ id: u.id, name: u.name, tag: u.email, points: u.balance||0, kills: 0, wins: 0, color: 'primary' }));
      }
      if (merge) {
        const existingIds = new Set(lb.map(e => e.id));
        newEntries.forEach(ne => { if (!existingIds.has(ne.id)) lb.push(ne); });
        lb = lb.sort((a,b) => (b.points||0) - (a.points||0)).slice(0, 100);
      } else {
        lb = newEntries;
      }
      await setKV(DB_KEYS.leaderboard, lb);
      window.allData[DB_KEYS.leaderboard] = lb;
      closeModal();
      showToast(`Leaderboard synced with ${lb.length} entries!`, 'success');
      switchPane('leaderboard');
    }

    window.executeSyncLeaderboard = executeSyncLeaderboard;

    async function bulkLeaderboardAction(action) {
      let lb = await getKV(DB_KEYS.leaderboard, []);
      if (action === 'reset') {
        if (!confirm('Delete ALL leaderboard entries? This cannot be undone.')) return;
        lb = [];
      } else if (action === 'resetpoints') {
        lb.forEach(e => e.points = 0);
      } else if (action === 'sortkills') {
        lb.sort((a,b) => (b.kills||0) - (a.kills||0));
      } else if (action === 'sortwins') {

    window.saveLBListCSV = async function(listType) {
      const csv = document.getElementById('lbListCsv').value.trim();
      const keys = { tc: DB_KEYS.tournamentChampions, tp: DB_KEYS.topPlayers, et: DB_KEYS.eliteTeams };
      const fields = {
        tc: ['name','championships','wins','winRate','points','image'],
        tp: ['name','kills','matches','kd','points','image'],
        et: ['name','members','wins','winRate','points','image']
      };
      const lines = csv.split('\n').filter(l => l.trim());
      const parsed = [];
      lines.forEach((line, i) => {
        const vals = line.split(',').map(v => v.trim());
        if (vals.length >= 5) {
          const entry = { id: `${listType}-${Date.now()}-${i}` };
          fields[listType].forEach((f, fi) => {
            const v = vals[fi] || '';
            entry[f] = f === 'image' || f === 'name' ? v : (parseFloat(v) || 0);
          });
          parsed.push(entry);
        }
      });
      // Re-sort by points descending and assign ranks
      parsed.sort((a,b) => (b.points||0) - (a.points||0));
      parsed.forEach((e,i) => e.rank = i+1);
      await localStorage.setItem(keys[listType], JSON.stringify(parsed));
      window.allData[keys[listType]] = parsed;
      closeModal();
      showToast(`${parsed.length} entries saved!`, 'success');
      switchPane('leaderboard');
    };

    window.saveLBEntry = async function(listType, id) {
      const keys = { tc: DB_KEYS.tournamentChampions, tp: DB_KEYS.topPlayers, et: DB_KEYS.eliteTeams };
      const list = window.allData[keys[listType]] || [];
      const idx = list.findIndex(x => x.id === id);
      if (idx < 0) return;
      const e = list[idx];
      if (e.name !== undefined) e.name = document.getElementById('lbeName').value.trim();
      if (e.championships !== undefined) e.championships = Number(document.getElementById('lbeChamp').value) || 0;
      if (e.kills !== undefined) e.kills = Number(document.getElementById('lbeKills').value) || 0;
      if (e.matches !== undefined) e.matches = Number(document.getElementById('lbeMatches').value) || 0;
      if (e.kd !== undefined) e.kd = parseFloat(document.getElementById('lbeKD').value) || 0;
      if (e.members !== undefined) e.members = Number(document.getElementById('lbeMem').value) || 0;
      if (e.wins !== undefined) e.wins = Number(document.getElementById('lbeWins').value) || 0;
      if (e.winRate !== undefined) e.winRate = Number(document.getElementById('lbeWR').value) || 0;
      if (e.points !== undefined) e.points = Number(document.getElementById('lbePts').value) || 0;
      if (e.image !== undefined) e.image = document.getElementById('lbeImg').value.trim();
      // Re-rank
      list.sort((a,b) => (b.points||0) - (a.points||0));
      list.forEach((item,i) => item.rank = i+1);
      await localStorage.setItem(keys[listType], JSON.stringify(list));
      window.allData[keys[listType]] = list;
      closeModal();
      showToast('Entry updated!', 'success');
      switchPane('leaderboard');

    window.adjustLBEntry = async function(listType, id, delta) {
      const keys = { tc: DB_KEYS.tournamentChampions, tp: DB_KEYS.topPlayers, et: DB_KEYS.eliteTeams };
      const list = window.allData[keys[listType]] || [];
      const idx = list.findIndex(x => x.id === id);
      if (idx < 0) return;
      list[idx].points = Math.max(0, (list[idx].points||0) + delta);
      list.sort((a,b) => (b.points||0) - (a.points||0));
      list.forEach((e,i) => e.rank = i+1);
      await localStorage.setItem(keys[listType], JSON.stringify(list));
      window.allData[keys[listType]] = list;
      showToast(`${delta > 0 ? '+' : ''}${delta} points for ${list[idx].name}`, 'success');
      switchPane('leaderboard');
    };

    async function addMissionFromAdmin() {
      const name = document.getElementById('missionName').value.trim();
      const email = document.getElementById('missionEmail').value.trim();
      const phone = document.getElementById('missionPhone').value.trim();
      const date = document.getElementById('missionDate').value;
      const time = document.getElementById('missionTime').value;
      const price = Number(document.getElementById('missionPrice').value) || 0;
      const status = document.getElementById('missionStatus').value;
      if (!name || !date) { showToast('Name and date required', 'error'); return; }
      const bookings = await getKV(DB_KEYS.bookings, []);
      const ticketId = 'TKT-' + Date.now().toString(36).toUpperCase();
      const allBookings = [...bookings, ...(await getKV(DB_KEYS.bookings2, []))];
      const newBooking = { id: `b-${Date.now()}`, ticketId, name, email, phone, date, time, price, status, playerNo: 1000 + allBookings.length + 1, created_at: new Date().toISOString() };
      const idx = bookings.length > 0 ? 0 : 1; // Store in bookings2 if bookings is empty
      if (idx === 0) { bookings.push(newBooking); await setKV(DB_KEYS.bookings, bookings); window.allData[DB_KEYS.bookings] = bookings; invalidateCache(); }
      else { const b2 = await getKV(DB_KEYS.bookings2, []); b2.push(newBooking); await setKV(DB_KEYS.bookings2, b2); window.allData[DB_KEYS.bookings2] = b2; invalidateCache(); }
      showToast('Mission created!', 'success');
      closeModal();
      switchPane('operations');
    }

    function previewPlayerCards() {
      const design = document.getElementById('cardDesign')?.value || 'tactical';
      const roleFilter = document.getElementById('exportRoleFilter')?.value || 'all';
      const statusFilter = document.getElementById('cardStatusFilter')?.value || 'all';
      const inclRank = document.getElementById('inclRank')?.checked ?? true;
      const inclBalance = document.getElementById('inclBalance')?.checked ?? true;
      const inclDate = document.getElementById('inclDate')?.checked ?? true;
      const inclEmail = document.getElementById('inclEmail')?.checked ?? false;
      const addDiscount = document.getElementById('addDiscount')?.checked ?? false;
      const discountType = document.getElementById('discountType')?.value || 'none';
      const addPerks = document.getElementById('addPerks')?.checked ?? false;

      let users = window.allData[DB_KEYS.users] || [];
      if (roleFilter !== 'all') users = users.filter(u => u.roles?.includes(roleFilter));
      if (statusFilter === 'active') users = users.filter(u => !u.isBanned);
      if (statusFilter === 'banned') users = users.filter(u => u.isBanned);

      if (!users.length) { showToast('No users match filters', 'error'); return; }

      const area = document.getElementById('cardPreviewArea');
      area.innerHTML = users.slice(0,12).map(u => generatePlayerCard(u, { design, inclRank, inclBalance, inclDate, inclEmail, addDiscount, discountType, addPerks })).join('');
      showToast(`Showing ${Math.min(users.length,12)} of ${users.length} cards`, 'success');
    }

    function generatePlayerCard(u, opts) {
      const { design, inclRank, inclBalance, inclDate, inclEmail, addDiscount, discountType, addPerks } = opts;
      const colors = { tactical: {bg:'#0f0f23',border:'#22c55e',accent:'#00c2ff',text:'#fff',sub:'#9ca3af'}, gold: {bg:'linear-gradient(135deg,#1a1400,#2d2000)',border:'#ffd700',accent:'#ffd700',text:'#ffd700',sub:'#c9a400'}, purple: {bg:'linear-gradient(135deg,#1a0f2e,#2e1a4a)',border:'#9d4edd',accent:'#9d4edd',text:'#c77dff',sub:'#9d4edd'}, red: {bg:'linear-gradient(135deg,#2e0f0f,#4a1a1a)',border:'#ef4444',accent:'#ef4444',text:'#ff6b6b',sub:'#ef4444'} };
      const c = colors[design] || colors.tactical;
      const roleBadge = u.roles?.includes('elite') ? 'ELITE' : u.roles?.includes('vip') ? 'VIP' : u.roles?.includes('champion') ? 'CHAMPION' : 'PLAYER';
      const roleColor = u.roles?.includes('elite') ? '#9d4edd' : u.roles?.includes('vip') ? '#ffd700' : u.roles?.includes('champion') ? '#ef4444' : '#22c55e';
      const discountBadge = addDiscount && discountType !== 'none' ? `<div style="position:absolute;top:10px;right:10px;background:${roleColor};color:#000;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:bold;">${discountType==='vip'?'VIP 25%':discountType==='elite'?'ELITE 30%':discountType+'% OFF'}</div>` : '';
      const perksBadge = addPerks ? `<div style="margin-top:6px;padding:4px 8px;background:rgba(34,197,94,0.2);border:1px solid #22c55e;border-radius:6px;font-size:11px;color:#22c55e;">★ PERKS INCLUDED</div>` : '';
      return `<div style="background:${c.bg};border:2px solid ${c.border};border-radius:16px;padding:20px;position:relative;min-width:300px;color:${c.text};font-family:Arial,sans-serif;">
        ${discountBadge}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <div style="font-size:10px;color:${c.sub};letter-spacing:2px;">CRAZY TOWN</div>
          <div style="font-size:11px;color:${roleColor};font-weight:bold;border:1px solid ${roleColor};padding:2px 8px;border-radius:4px;">${roleBadge}</div>
        </div>
        <div style="font-size:24px;font-weight:bold;margin-bottom:4px;">${u.name || 'Unknown'}</div>
        ${inclEmail ? `<div style="font-size:12px;color:${c.sub};margin-bottom:8px;">${u.email||''}</div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;">
          ${inclRank ? `<div style="background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;"><div style="font-size:10px;color:${c.sub};">Rank</div><div style="font-weight:bold;font-size:14px;">${Array.isArray(u.roles)?u.roles.join('/'):(u.rank||'Recruit')}</div></div>` : ''}
          ${inclBalance ? `<div style="background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;"><div style="font-size:10px;color:${c.sub};">Balance</div><div style="font-weight:bold;font-size:14px;">${Number(u.balance||0).toFixed(0)} EGP</div></div>` : ''}
          ${inclDate ? `<div style="background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;"><div style="font-size:10px;color:${c.sub};">Joined</div><div style="font-weight:bold;font-size:14px;">${u.joined?new Date(u.joined).toLocaleDateString('en-GB'):'-'}</div></div>` : ''}
          <div style="background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;"><div style="font-size:10px;color:${c.sub};">ID</div><div style="font-weight:bold;font-size:14px;">${(u.id||'---').slice(-8).toUpperCase()}</div></div>
        </div>
        ${perksBadge}
      </div>`;
    }

    function exportPlayerCards() {
      const design = document.getElementById('cardDesign')?.value || 'tactical';

    async function addNewUser() {
      const email = document.getElementById('newUserEmail').value.trim();
      const pass = document.getElementById('newUserPass').value;
      const name = document.getElementById('newUserName').value.trim();
      const phone = document.getElementById('newUserPhone').value.trim();
      const type = document.getElementById('newUserType').value;

      if (!email || !pass || !name) { showToast('Fill all required fields', 'error'); return; }

      try {
        const { data, error } = await registerUser(email, pass, { name, phone });
        if (error) throw error;

        let users = await getKV(DB_KEYS.users, []);
        const newUser = {
          id: data.user?.id || `u-${Date.now()}`,
          name, email, phone,
          rank: type === 'player' ? 'Recruit' : type.toUpperCase(),
          roles: [type],
          balance: 0, isBanned: false,
          joined: new Date().toISOString()
        };
        users.push(newUser);
        await setKV(DB_KEYS.users, users);

        showToast('User created successfully!', 'success');
        closeModal();
        window.allData[DB_KEYS.users] = users;
        switchPane('users');
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    function handleSearch() {
      const q = document.getElementById('adminGlobalSearch').value.toLowerCase();

      const tabs = ['insights','bookings','orders','users','team','leaderboard','commerce','coupons','tournaments','operations','customers','news','support','activity'];
      const matches = tabs.filter(t => t.includes(q));
      results.innerHTML = matches.map(t => `<div class="search-item" onclick="switchPane('${t}');document.getElementById('adminGlobalSearch').value='';results.style.display='none';">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
      results.style.display = matches.length ? 'block' : 'none';
    }

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Backspace' && !e.target.matches('input,textarea')) goBack();
      if (e.ctrlKey && e.key === 'a') { e.preventDefault(); switchPane('users'); }
      if (e.ctrlKey && e.key === 'e') { e.preventDefault(); switchPane('insights'); }
      if (e.ctrlKey && e.key === 'r') exportBackup();
    });

    async function init() {
      try {
        // Try to sync session from Supabase first
        let user = await getCurrentUser();

        // If no user from Supabase, check localStorage session as fallback
        if (!user) {
          const localSessionId = localStorage.getItem('crazyTown_session');
          if (localSessionId) {
            // Try to find user by id in localStorage session
            const allUsers = await getKV(DB_KEYS.users, []);
            user = allUsers.find(u => u.id === localSessionId);
            if (user && !user.email) user = null; // Don't trust session-only match with no email
          }
        }

        const allUsers = await getKV(DB_KEYS.users, []);
        const localUser = user?.email ? allUsers.find(u => u.email === user.email) : (user ? allUsers.find(u => u.id === user.id) : null);

        if (!localUser || !isAdmin(localUser)) {
          document.body.innerHTML = `<div style="padding:60px;text-align:center;background:#0f0f23;min-height:100vh;color:#fff;font-family:Arial,sans-serif;">
            <div style="background:#1a1a2e;border:1px solid #2a2a42;border-radius:16px;padding:40px;max-width:400px;margin:0 auto;">
              <h2 style="color:#ef4444;margin:0 0 12px;">⚠️ Access Denied</h2>
              <p style="color:#9ca3af;margin:0 0 20px;">Admin access required. Please login as admin.</p>
              <button class="btn" onclick="window.location.href='index.html'" style="background:#00c2ff;color:#000;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;">Go to Main Site</button>
            </div>
          </div>`;
          return;
        }

        const data = await loadAllData();
        renderStats(data);
        renderPanes(data);
      } catch(e) {
        console.error('Admin init error:', e);
        document.body.innerHTML = `<div style="padding:60px;text-align:center;"><h2 style="color:#ef4444;">Error Loading Admin</h2><p>${e.message}</p><button onclick="location.reload()" class="btn">Retry</button></div>`;
      }
    }

    init();
