<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crazy Town Admin</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --text:#fff; --muted:#9ca3af; --line:#2a2a42; --accent:#00c2ff; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:linear-gradient(180deg,#0d1024,#0f0f23); color:var(--text); min-height:100vh; }
    .wrap { width:min(1400px,96vw); margin:18px auto; }
    .top { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center; position:sticky; top:10px; z-index:10; background:rgba(15,15,35,0.86); backdrop-filter:blur(8px); border:1px solid var(--line); border-radius:14px; padding:10px 12px; margin-bottom:12px; }
    .admin-main-layout { display:grid; grid-template-columns:260px 1fr; gap:16px; align-items:start; }
    .admin-sidebar { position:sticky; top:84px; max-height:calc(100vh - 98px); overflow:auto; }
    .admin-content { min-width:0; }
    .tabs { display:flex; gap:6px; flex-direction:column; margin:10px 0; }
    .tab, .btn { border:1px solid var(--line); background:#151528; color:var(--text); padding:10px 14px; border-radius:10px; cursor:pointer; transition:all .22s; font-size:14px; }
    .tab:hover, .btn:hover { transform:translateY(-1px); border-color:#3c4568; background:#1b1b34; }
    .tab { text-align:left; width:100%; }
    .tab.active { border-color:var(--accent); color:var(--accent); background:rgba(0,194,255,0.12); }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; }
    .pane { display:none; }
    .pane.active { display:block; }
    table { width:100%; border-collapse: collapse; min-width:800px; }
    th, td { border-bottom:1px solid var(--line); padding:10px 8px; text-align:left; font-size:13px; }
    th { background:#16162d; position:sticky; top:0; }
    tr:nth-child(even) td { background:rgba(255,255,255,0.015); }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; margin-top:10px; }
    input, select, textarea { width:100%; background:#121226; color:#fff; border:1px solid var(--line); border-radius:8px; padding:10px; margin:4px 0; font-size:14px; }
    .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin:10px 0; }
    .badge { padding:2px 8px; border-radius:999px; border:1px solid var(--line); font-size:11px; }
    .ok { color:var(--ok); } .warn { color:var(--warn); } .danger { color:var(--danger); }
    .small { color:var(--muted); font-size:12px; }
    .log { max-height:300px; overflow:auto; border:1px solid var(--line); border-radius:8px; padding:10px; background:#0f0f1a; }
    .search-wrap { position:relative; }
    #adminSearchResults { position:absolute; top:calc(100% + 6px); left:0; right:0; background:#121226; border:1px solid var(--line); border-radius:12px; max-height:280px; overflow:auto; z-index:20; display:none; }
    .search-item { padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; font-size:14px; }
    .search-item:last-child { border-bottom:none; }
    .search-item:hover { background:#1b1b33; }
    .search-item .small { display:block; margin-top:2px; }
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:100; display:none; align-items:center; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:#1a1a2e; border:1px solid var(--line); border-radius:16px; padding:24px; width:min(500px,90vw); }
    .modal h3 { margin:0 0 16px; color:var(--accent); }
    .modal-actions { display:flex; gap:10px; margin-top:16px; justify-content:flex-end; }
    @media (max-width: 980px) { .admin-main-layout { grid-template-columns:1fr; } .admin-sidebar { position:relative; top:0; } }
    .toast { position:fixed; top:20px; right:20px; padding:12px 20px; background:#1a1a2e; border:1px solid var(--accent); border-radius:10px; color:#fff; z-index:9999; animation:slideIn .3s; }
    @keyframes slideIn { from{transform:translateX(100%);} to{transform:translateX(0);} }
    .form-section { background:#121226; border:1px solid var(--line); border-radius:10px; padding:16px; margin:10px 0; }
    .form-section h4 { margin:0 0 12px; color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1 style="margin:0;font-size:1.4rem;">Admin Control Center</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
        <button class="btn" onclick="goBack()">&#8592; Back</button>
        <button class="btn" onclick="goHome()">Main Site</button>
        <button class="btn" onclick="exportBackup()">Export Backup</button>
      </div>
    </div>
    <div class="admin-main-layout">
      <aside class="admin-sidebar">
        <div class="card" style="padding:12px;">
          <input id="adminGlobalSearch" type="search" placeholder="Search..." oninput="handleSearch()" style="margin:0;">
          <div id="adminSearchResults"></div>
        </div>
        <div class="tabs" id="tabs"></div>
      </aside>
      <div class="admin-content">
        <div class="grid" id="statsGrid"></div>
        <div id="paneContent"></div>
      </div>
    </div>
  </div>
  <div id="toastContainer"></div>
  <div id="modalContainer"></div>
  <script type="module">
    import { supabase, getCurrentUser, getKV, setKV, getUsers, saveUsers, loginUser, registerUser } from './db.js';

    const DB_KEYS = {
      users: 'crazyTown_users', bookings: 'crazyTown_bookings', orders: 'crazyTown_orders',
      leaderboard: 'crazyTown_leaderboard', activity: 'crazyTown_activity', coupons: 'crazyTown_coupons',
      inventory: 'crazyTown_inventory', news: 'crazyTown_news', teams: 'crazyTown_teams',
      tournaments: 'crazyTown_tournaments', settings: 'crazyTown_settings', cart: 'crazyTown_cart'
    };

    function hasRole(u, r) { return u && Array.isArray(u.roles) && u.roles.includes(r); }
    function isAdmin(u) { return hasRole(u,'admin') || hasRole(u,'owner') || hasRole(u,'co-owner') || hasRole(u,'ceo'); }
    function showToast(msg, type='info') {
      const el = document.createElement('div');
      el.className = 'toast';
      el.style.borderColor = type === 'success' ? '#22c55e' : type === 'error' ? '#ef4444' : '#00c2ff';
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    function goBack() { window.history.back(); }
    function goHome() { window.location.href = 'index.html'; }

    async function loadAllData() {
      const keys = Object.values(DB_KEYS);
      const data = {};
      for (const k of keys) { data[k] = await getKV(k, k.includes('Town') ? [] : null); }
      return data;
    }

    function renderStats(data) {
      const users = Array.isArray(data[DB_KEYS.users]) ? data[DB_KEYS.users] : [];
      const bookings = Array.isArray(data[DB_KEYS.bookings]) ? data[DB_KEYS.bookings] : [];
      const orders = Array.isArray(data[DB_KEYS.orders]) ? data[DB_KEYS.orders] : [];
      const revenue = [...bookings, ...orders].reduce((s, b) => s + Number(b.price || 0), 0);
      const vipCount = users.filter(u => hasRole(u,'vip') || hasRole(u,'elite') || hasRole(u,'champion')).length;
      document.getElementById('statsGrid').innerHTML = `
        <div class="card"><div class="small">Total Revenue</div><h2 style="margin:8px 0 0">${revenue.toFixed(0)} EGP</h2></div>
        <div class="card"><div class="small">Total Users</div><h2 style="margin:8px 0 0">${users.length}</h2></div>
        <div class="card"><div class="small">Bookings</div><h2 style="margin:8px 0 0">${bookings.length}</h2></div>
        <div class="card"><div class="small">Shop Orders</div><h2 style="margin:8px 0 0">${orders.length}</h2></div>
        <div class="card"><div class="small">VIP Users</div><h2 style="margin:8px 0 0">${vipCount}</h2></div>
        <div class="card"><div class="small">Admins</div><h2 style="margin:8px 0 0">${users.filter(u => isAdmin(u)).length}</h2></div>
      `;
    }

    function renderPanes(data) {
      const tabs = [
        {id:'insights', label:'Insights', icon:'&#128200;'},
        {id:'bookings', label:'Bookings', icon:'&#128197;'},
        {id:'orders', label:'Order History', icon:'&#128722;'},
        {id:'users', label:'Users', icon:'&#128101;'},
        {id:'team', label:'Team Control', icon:'&#129309;'},
        {id:'leaderboard', label:'Leaderboard', icon:'&#127941;'},
        {id:'commerce', label:'Commerce', icon:'&#128188;'},
        {id:'coupons', label:'Coupons', icon:'&#128179;'},
        {id:'tournaments', label:'Tournaments', icon:'&#127942;'},
        {id:'operations', label:'Operations', icon:'&#9881;'},
        {id:'customers', label:'Customers', icon:'&#128079;'},
        {id:'news', label:'News', icon:'&#128240;'},
        {id:'support', label:'Support', icon:'&#128172;'},
        {id:'activity', label:'Activity', icon:'&#128221;'}
      ];

      document.getElementById('tabs').innerHTML = tabs.map(t =>
        `<button class="tab" onclick="switchPane('${t.id}')" data-tab="${t.id}">${t.icon} ${t.label}</button>`
      ).join('');

      window.allData = data;
      switchPane('insights');
    }

    function switchPane(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-tab="${id}"]`)?.classList.add('active');
      const data = window.allData;
      const d = {
        users: Array.isArray(data[DB_KEYS.users]) ? data[DB_KEYS.users] : [],
        bookings: Array.isArray(data[DB_KEYS.bookings]) ? data[DB_KEYS.bookings] : [],
        orders: Array.isArray(data[DB_KEYS.orders]) ? data[DB_KEYS.orders] : [],
        leaderboard: Array.isArray(data[DB_KEYS.leaderboard]) ? data[DB_KEYS.leaderboard] : [],
        activity: Array.isArray(data[DB_KEYS.activity]) ? data[DB_KEYS.activity] : [],
        coupons: Array.isArray(data[DB_KEYS.coupons]) ? data[DB_KEYS.coupons] : [],
        inventory: Array.isArray(data[DB_KEYS.inventory]) ? data[DB_KEYS.inventory] : [],
        news: Array.isArray(data[DB_KEYS.news]) ? data[DB_KEYS.news] : [],
        teams: Array.isArray(data[DB_KEYS.teams]) ? data[DB_KEYS.teams] : [],
        tournaments: Array.isArray(data[DB_KEYS.tournaments]) ? data[DB_KEYS.tournaments] : []
      };

      let html = '';
      switch(id) {
        case 'insights':
          const pendingBookings = d.bookings.filter(b => b.status === 'Pending').length;
          const pendingOrders = d.orders.filter(o => o.status === 'Pending Confirmation').length;
          const lowStock = d.inventory.filter(i => (i.qty || 0) < 5).length;
          html = `<div class="card"><h3>Quick Stats</h3><div class="grid">
            <div><div class="small">Pending Bookings</div><h2>${pendingBookings}</h2></div>
            <div><div class="small">Pending Orders</div><h2>${pendingOrders}</h2></div>
            <div><div class="small">Low Stock</div><h2>${lowStock}</h2></div>
            <div><div class="small">Active Teams</div><h2>${d.teams.length}</h2></div>
          </div></div>`;
          break;
        case 'bookings':
          html = `<div class="card"><h3>Bookings</h3>
            <div class="table-wrap"><table><thead><tr><th>Ticket</th><th>Name</th><th>Date</th><th>Status</th><th>Price</th><th>Actions</th></tr></thead><tbody>
            ${d.bookings.length ? d.bookings.map(b => `<tr><td>${b.ticketId || '-'}</td><td>${b.name || '-'}</td><td>${b.date || '-'} ${b.time || ''}</td><td><span class="badge ${b.status==='Confirmed'?'ok':'warn'}">${b.status || '-'}</span></td><td>${Number(b.price||0).toFixed(0)} EGP</td><td><button class="btn" onclick="toggleBooking('${b.id}')">${b.status==='Confirmed'?'Pending':'Confirm'}</button> <button class="btn" onclick="deleteBooking('${b.id}')">Delete</button></td></tr>`).join('') : '<tr><td colspan="6">No bookings</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'orders':
          html = `<div class="card"><h3>Order History</h3>
            <div class="table-wrap"><table><thead><tr><th>Order ID</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody>
            ${d.orders.length ? d.orders.map(o => `<tr><td>${o.id || '-'}</td><td>${o.items?.length || 0}</td><td>${Number(o.total||0).toFixed(0)} EGP</td><td><span class="badge warn">${o.status || '-'}</span></td><td>${new Date(o.created_at).toLocaleDateString()}</td></tr>`).join('') : '<tr><td colspan="5">No orders</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'users':
          html = `<div class="card"><h3>Users <button class="btn" onclick="openAddUserModal()" style="float:right;margin-top:-8px;">+ Add User</button></h3>
            <div class="table-wrap"><table><thead><tr><th>Name</th><th>Email</th><th>Rank</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead><tbody>
            ${d.users.map(u => `<tr><td>${u.name || '-'}</td><td>${u.email || '-'}</td><td>${u.rank || 'Recruit'}</td><td>${Number(u.balance||0).toFixed(0)}</td><td>${u.isBanned?'<span class="danger">Banned</span>':'<span class="ok">Active</span>'}</td><td>
              <button class="btn" onclick="toggleAdmin('${u.id}')">${isAdmin(u)?'RemoveAdmin':'MakeAdmin'}</button>
              <button class="btn" onclick="toggleBan('${u.id}')">${u.isBanned?'Unban':'Ban'}</button>
              <button class="btn" onclick="openEditUserModal('${u.id}')">Edit</button>
              <button class="btn" onclick="adjustBalance('${u.id}')">Balance</button>
              <button class="btn" onclick="deleteUser('${u.id}')" style="color:#ef4444;">Delete</button>
            </td></tr>`).join('')}
            </tbody></table></div></div>`;
          break;
        case 'team':
          html = `<div class="card"><h3>Team Control</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="switchPane('operations')" style="background:#1b1b34;">View Operations</button></div>
            <div class="table-wrap"><table><thead><tr><th>Name</th><th>Leader</th><th>Members</th><th>Tournament</th><th>Status</th><th>Actions</th></tr></thead><tbody>
            ${d.teams.length ? d.teams.map(t => `<tr><td><strong>${t.name||'-'}</strong></td><td>${t.leader||'-'}</td><td>${t.members?.length||0}</td><td>${t.tournament?'<span class="badge ok">'+t.tournament+'</span>':'-'}</td><td><span class="badge ${t.status==='active'?'ok':'warn'}">${t.status||'active'}</span></td><td>
              <button class="btn" onclick="editTeam('${t.id}')">Edit</button>
              <button class="btn" onclick="disbandTeam('${t.id}')" style="color:#ef4444;">Disband</button>
            </td></tr>`).join('') : '<tr><td colspan="6">No teams registered</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'leaderboard':
          html = `<div class="card"><h3>Leaderboard</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="addLeaderboardEntryFromAdmin()" style="background:var(--accent);color:#000;">+ Add Player</button></div>
            <div class="table-wrap"><table><thead><tr><th>Rank</th><th>Name</th><th>Points</th><th>Kills</th><th>Wins</th><th>Actions</th></tr></thead><tbody>
            ${d.leaderboard.map((e,i) => `<tr><td>#${i+1}</td><td>${e.name||'-'}</td><td>${e.points||0}</td><td>${e.kills||0}</td><td>${e.wins||0}</td><td>
              <button class="btn" onclick="editLeaderboardEntry('${e.id}')">Edit</button>
              <button class="btn" onclick="deleteLeaderboardEntry('${e.id}')">Delete</button>
            </td></tr>`).join('')}
            </tbody></table></div></div>`;
          break;
        case 'commerce':
          const lowStockItems = d.inventory.filter(i => (i.qty || 0) < 5);
          html = `<div class="card"><h3>Inventory Management</h3>
            <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;">
              <button class="btn" onclick="openAddInventoryModal()" style="background:var(--accent);color:#000;">+ Add Item</button>
              <button class="btn" onclick="switchPane('coupons')">Manage Coupons</button>
            </div>
            ${lowStockItems.length ? `<div style="background:#3b1a0a;border:1px solid #ef4444;border-radius:8px;padding:10px;margin-bottom:12px;"><strong style="color:#ef4444;">Low Stock Alert:</strong> ${lowStockItems.length} items need restock</div>` : ''}
            <div class="table-wrap"><table><thead><tr><th>Item</th><th>Category</th><th>Price</th><th>Qty</th><th>Actions</th></tr></thead><tbody>
            ${d.inventory.length ? d.inventory.map(i => `<tr><td>${i.name||'-'}</td><td>${i.category||'-'}</td><td>${Number(i.price||0).toFixed(0)} EGP</td><td class="${(i.qty||0)<5?'warn':''}">${i.qty||0}</td><td>
              <button class="btn" onclick="editInventory('${i.id}')">Edit</button>
              <button class="btn" onclick="deleteInventory('${i.id}')" style="color:#ef4444;">Delete</button>
            </td></tr>`).join('') : '<tr><td colspan="5">No inventory items</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'coupons':
          html = `<div class="card"><h3>Coupon Management</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="openAddCouponModal()" style="background:var(--accent);color:#000;">+ Add Coupon</button></div>
            <div class="table-wrap"><table><thead><tr><th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Uses</th><th>Active</th><th>Actions</th></tr></thead><tbody>
            ${d.coupons.length ? d.coupons.map(c => `<tr><td><code style="background:#1a1a2e;padding:2px 6px;border-radius:4px;">${c.code||'-'}</code></td><td>${c.type||'%'}</td><td>${c.type==='percent'?c.value+'%':Number(c.value||0).toFixed(0)+' EGP'}</td><td>${c.minOrder||0}</td><td>${c.used||0}/${c.maxUses||'∞'}</td><td>
              <button class="btn" onclick="toggleCouponActive('${c.code}')" style="background:${c.active?'#166534':'#991b1b'};color:#fff;border:none;">${c.active?'Active':'Inactive'}</button>
            </td><td>
              <button class="btn" onclick="editCoupon('${c.code}')">Edit</button>
              <button class="btn" onclick="deleteCoupon('${c.code}')" style="color:#ef4444;">Delete</button>
            </td></tr>`).join('') : '<tr><td colspan="7">No coupons</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'tournaments':
          html = `<div class="card"><h3>Tournament Management</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="openAddTournamentModal()" style="background:var(--accent);color:#000;">+ Create Tournament</button></div>
            <div class="table-wrap"><table><thead><tr><th>Name</th><th>Date</th><th>Teams</th><th>Entry Fee</th><th>Prize</th><th>Status</th><th>Actions</th></tr></thead><tbody>
            ${d.tournaments.length ? d.tournaments.map(t => `<tr><td>${t.name||'-'}</td><td>${t.date||'-'}</td><td>${t.registrations?.length||0}/${t.maxTeams||'?'}</td><td>${Number(t.entryFee||0).toFixed(0)} EGP</td><td>${Number(t.prize||0).toFixed(0)} EGP</td><td><span class="badge ${t.status==='Active'?'ok':'warn'}">${t.status||'Draft'}</span></td><td>
              <button class="btn" onclick="editTournament('${t.id}')">Edit</button>
              <button class="btn" onclick="deleteTournament('${t.id}')" style="color:#ef4444;">Delete</button>
            </td></tr>`).join('') : '<tr><td colspan="7">No tournaments</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'news':
          html = `<div class="card"><h3>News Management</h3>
            <div style="margin-bottom:12px;"><button class="btn" onclick="openAddNewsModal()" style="background:var(--accent);color:#000;">+ Add Article</button></div>
            <div class="table-wrap"><table><thead><tr><th>Title</th><th>Body</th><th>Date</th><th>Featured</th><th>Actions</th></tr></thead><tbody>
            ${d.news.length ? d.news.map(n => `<tr><td><strong>${n.title||'-'}</strong></td><td>${(n.body||'-').substring(0,60)}...</td><td>${n.date?new Date(n.date).toLocaleDateString():'-'}</td><td>${n.featured?'<span class="ok">★</span>':'<span style="color:#555;">-</span>'}</td><td>
              <button class="btn" onclick="toggleFeaturedNews('${n.id}')">${n.featured?'Unfeature':'Feature'}</button>
              <button class="btn" onclick="editNews('${n.id}')">Edit</button>
              <button class="btn" onclick="deleteNews('${n.id}')" style="color:#ef4444;">Delete</button>
            </td></tr>`).join('') : '<tr><td colspan="5">No news articles</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'support':
          const tickets = (window.allData['crazyTown_chat'] || []).filter(m => m.isTicket);
          html = `<div class="card"><h3>Support Tickets</h3>
            <div class="table-wrap"><table><thead><tr><th>ID</th><th>From</th><th>Subject</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead><tbody>
            ${tickets.length ? tickets.map(t => `<tr><td>#${t.id?.slice(-6)||'-'}</td><td>${t.sender||'-'}</td><td>${t.subject||'-'}</td><td><span class="badge ${t.status==='open'?'ok':'warn'}">${t.status||'open'}</span></td><td>${t.created_at?new Date(t.created_at).toLocaleDateString():'-'}</td><td>
              <button class="btn" onclick="viewTicket('${t.id}')">View</button>
              <button class="btn" onclick="closeTicket('${t.id}')">${t.status==='closed'?'Reopen':'Close'}</button>
            </td></tr>`).join('') : '<tr><td colspan="6">No tickets</td></tr>'}
            </tbody></table></div></div>`;
          break;
        case 'activity':
          html = `<div class="card"><h3>Activity Log</h3>
            <div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;">
              <input type="search" id="activitySearch" placeholder="Filter activities..." oninput="filterActivity(this.value)" style="max-width:250px;">
              <button class="btn" onclick="clearActivityLog()" style="color:#ef4444;border-color:#ef4444;">Clear All</button>
              <button class="btn" onclick="exportActivityLog()">Export Log</button>
            </div>
            <div class="log" id="activityLogContent">

          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Close</button>
            <button class="btn" style="background:var(--accent);color:#000;" onclick="sendTicketReply('${id}')">Send Reply</button>
          </div>
        </div></div>`;
    }

    async function sendTicketReply(id) {
      const reply = document.getElementById('ticketReply').value.trim();
      if (!reply) { showToast('Reply cannot be empty', 'error'); return; }
      let chat = await getKV('crazyTown_chat', []);
      chat.push({ id: `reply-${Date.now()}`, ticketId: id, sender: 'Admin', body: reply, isReply: true, created_at: new Date().toISOString() });
      await setKV('crazyTown_chat', chat);
      window.allData['crazyTown_chat'] = chat;
      showToast('Reply sent', 'success');
      closeModal();
      switchPane('support');
    }

    async function closeTicket(id) {
      let chat = await getKV('crazyTown_chat', []);
      const idx = chat.findIndex(x => x.id === id);
      if (idx >= 0) { chat[idx].status = chat[idx].status === 'closed' ? 'open' : 'closed'; await setKV('crazyTown_chat', chat); window.allData['crazyTown_chat'] = chat; showToast('Ticket updated', 'success'); switchPane('support'); }
    }

    // === ACTIVITY LOG FUNCTIONS ===
    function filterActivity(q) {
      const content = document.getElementById('activityLogContent');
      const all = window.allData[DB_KEYS.activity] || [];
      if (!q) { content.innerHTML = all.slice(0,50).map(a => `<div style="margin-bottom:8px;border-bottom:1px solid #2a2a42;padding-bottom:8px;"><small style="color:#9ca3af;">${new Date(a.at).toLocaleString()}</small> <span style="background:#1b1b34;padding:1px 6px;border-radius:4px;">${a.actor||'System'}</span> ${a.action}</div>`).join('') || '<div>No activity</div>'; return; }
      const filtered = all.filter(a => (a.action||'').toLowerCase().includes(q.toLowerCase()) || (a.actor||'').toLowerCase().includes(q.toLowerCase()));
      content.innerHTML = filtered.slice(0,50).map(a => `<div style="margin-bottom:8px;border-bottom:1px solid #2a2a42;padding-bottom:8px;"><small style="color:#9ca3af;">${new Date(a.at).toLocaleString()}</small> <span style="background:#1b1b34;padding:1px 6px;border-radius:4px;">${a.actor||'System'}</span> ${a.action}</div>`).join('') || '<div>No matches</div>';
    }

    async function clearActivityLog() {
      if (!confirm('Clear entire activity log?')) return;
      await setKV(DB_KEYS.activity, []);
      window.allData[DB_KEYS.activity] = [];
      showToast('Activity log cleared', 'success');
      switchPane('activity');
    }

    function exportActivityLog() {
      const all = window.allData[DB_KEYS.activity] || [];
      const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'activity-log-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      showToast('Activity log exported', 'success');
    }

    // === TEAM FUNCTIONS ===
    function editTeam(id) {
      const t = (window.allData[DB_KEYS.teams] || []).find(x => x.id === id);
      if (!t) return;
      document.getElementById('modalContainer').innerHTML = `<div class="modal-overlay show" onclick="if(event.target===this)closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <h3>Edit Team: ${t.name}</h3>
          <div class="form-section">
            <input type="text" id="editTeamName" value="${t.name||''}" placeholder="Team name">
            <input type="text" id="editTeamLeader" value="${t.leader||''}" placeholder="Leader name">
            <select id="editTeamStatus"><option value="active" ${t.status==='active'?'selected':''}>Active</option><option value="inactive" ${t.status==='inactive'?'selected':''}>Inactive</option><option value="banned" ${t.status==='banned'?'selected':''}>Banned</option></select>
            <h4 style="margin:8px 0 4px;color:#9ca3af;">Members (one per line)</h4>
            <textarea id="editTeamMembers" style="height:80px;">${(t.members||[]).join('\n')}</textarea>
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn" style="background:var(--accent);color:#000;" onclick="saveTeamEdit('${id}')">Save</button>
          </div>
        </div></div>`;
    }

    async function saveTeamEdit(id) {
      let teams = await getKV(DB_KEYS.teams, []);
      const idx = teams.findIndex(x => x.id === id);
      if (idx >= 0) {
        const membersText = document.getElementById('editTeamMembers').value.trim();
        const members = membersText ? membersText.split('\n').map(m => m.trim()).filter(m => m) : [];
        teams[idx] = { ...teams[idx], name: document.getElementById('editTeamName').value.trim(), leader: document.getElementById('editTeamLeader').value.trim(), status: document.getElementById('editTeamStatus').value, members };
        await setKV(DB_KEYS.teams, teams);
        window.allData[DB_KEYS.teams] = teams;
        showToast('Team updated', 'success');
        closeModal();
        switchPane('team');
      }
    }

    async function disbandTeam(id) {
      if (!confirm('Disband this team? This cannot be undone.')) return;
      let teams = await getKV(DB_KEYS.teams, []);
      teams = teams.filter(x => x.id !== id);
      await setKV(DB_KEYS.teams, teams);
      window.allData[DB_KEYS.teams] = teams;
      showToast('Team disbanded', 'success');
      switchPane('team');
    }

    // === ADD LEADBOARD ENTRY ===
    async function addLeaderboardEntryFromAdmin() {
      const name = prompt('Player name:');
      if (!name) return;
      const points = Number(prompt('Points:') || 0);
      const kills = Number(prompt('Kills:') || 0);
      const wins = Number(prompt('Wins:') || 0);
      let lb = await getKV(DB_KEYS.leaderboard, []);
      lb.push({ id: `lb-${Date.now()}`, name, points, kills, wins });
      await setKV(DB_KEYS.leaderboard, lb);
      window.allData[DB_KEYS.leaderboard] = lb;
      showToast('Entry added', 'success');
      switchPane('leaderboard');
    }

    function openAddUserModal() {
      const modal = document.getElementById('modalContainer');
      modal.innerHTML = `<div class="modal-overlay show" onclick="if(event.target===this)closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
          <h3>+ Add New User</h3>
          <div class="form-section">
            <h4>Account Type</h4>
            <select id="newUserType"><option value="player">Normal Player</option><option value="vip">VIP</option><option value="elite">Elite</option><option value="champion">Champion</option><option value="admin">Admin</option></select>
          </div>
          <div class="form-section">
            <h4>Credentials</h4>
            <input type="email" id="newUserEmail" placeholder="Email address">
            <input type="password" id="newUserPass" placeholder="Password">
            <input type="text" id="newUserName" placeholder="Full name">
            <input type="text" id="newUserPhone" placeholder="Phone (optional)">
          </div>
          <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancel</button>
            <button class="btn" style="background:var(--accent);color:#000;" onclick="addNewUser()">Create User</button>
          </div>
        </div>
      </div>`;
    }

    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    async function addNewUser() {
      const email = document.getElementById('newUserEmail').value.trim();
      const pass = document.getElementById('newUserPass').value;
      const name = document.getElementById('newUserName').value.trim();
      const phone = document.getElementById('newUserPhone').value.trim();
      const type = document.getElementById('newUserType').value;

      if (!email || !pass || !name) { showToast('Fill all required fields', 'error'); return; }

      try {
        const { data, error } = await registerUser(email, pass, { name, phone });
        if (error) throw error;

        let users = await getKV(DB_KEYS.users, []);
        const newUser = {
          id: data.user?.id || `u-${Date.now()}`,
          name, email, phone,
          rank: type === 'player' ? 'Recruit' : type.toUpperCase(),
          roles: [type],
          balance: 0, isBanned: false,
          joined: new Date().toISOString()
        };
        users.push(newUser);
        await setKV(DB_KEYS.users, users);

        showToast('User created successfully!', 'success');
        closeModal();
        window.allData[DB_KEYS.users] = users;
        switchPane('users');
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    function handleSearch() {
      const q = document.getElementById('adminGlobalSearch').value.toLowerCase();
      const results = document.getElementById('adminSearchResults');
      if (!q) { results.style.display = 'none'; return; }
      const tabs = ['insights','bookings','orders','users','team','leaderboard','commerce','coupons','tournaments','operations','customers','news','support','activity'];
      const matches = tabs.filter(t => t.includes(q));
      results.innerHTML = matches.map(t => `<div class="search-item" onclick="switchPane('${t}');document.getElementById('adminGlobalSearch').value='';results.style.display='none';">${t.charAt(0).toUpperCase()+t.slice(1)}</div>`).join('');
      results.style.display = matches.length ? 'block' : 'none';
    }

    async function exportBackup() {
      const data = await loadAllData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'crazytown-backup-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      showToast('Backup exported!', 'success');
    }

    window.goBack = goBack;
    window.goHome = goHome;
    window.switchPane = switchPane;
    window.toggleBooking = toggleBooking;
    window.deleteBooking = deleteBooking;
    window.toggleAdmin = toggleAdmin;
    window.toggleBan = toggleBan;
    window.deleteUser = deleteUser;
    window.adjustBalance = adjustBalance;
    window.openAddUserModal = openAddUserModal;
    window.closeModal = closeModal;
    window.addNewUser = addNewUser;
    window.handleSearch = handleSearch;
    window.exportBackup = exportBackup;
    window.openEditUserModal = openEditUserModal;
    window.saveEditUser = saveEditUser;
    window.editLeaderboardEntry = editLeaderboardEntry;
    window.deleteLeaderboardEntry = deleteLeaderboardEntry;
    window.openAddInventoryModal = openAddInventoryModal;
    window.editInventory = editInventory;
    window.deleteInventory = deleteInventory;
    window.openAddCouponModal = openAddCouponModal;
    window.toggleCouponActive = toggleCouponActive;
    window.editCoupon = editCoupon;
    window.deleteCoupon = deleteCoupon;
    window.openAddTournamentModal = openAddTournamentModal;
    window.editTournament = editTournament;
    window.deleteTournament = deleteTournament;
    window.openAddNewsModal = openAddNewsModal;
    window.toggleFeaturedNews = toggleFeaturedNews;
    window.editNews = editNews;
    window.deleteNews = deleteNews;
    window.viewTicket = viewTicket;
    window.closeTicket = closeTicket;
    window.filterActivity = filterActivity;
    window.clearActivityLog = clearActivityLog;
    window.exportActivityLog = exportActivityLog;
    window.editTeam = editTeam;
    window.disbandTeam = disbandTeam;
    window.addLeaderboardEntryFromAdmin = addLeaderboardEntryFromAdmin;

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Backspace' && !e.target.matches('input,textarea')) goBack();
      if (e.ctrlKey && e.key === 'a') { e.preventDefault(); switchPane('users'); }
      if (e.ctrlKey && e.key === 'e') { e.preventDefault(); switchPane('insights'); }
      if (e.ctrlKey && e.key === 'r') exportBackup();
    });

    async function init() {
      try {
        const user = await getCurrentUser();
        const allUsers = await getKV(DB_KEYS.users, []);
        const localUser = allUsers.find(u => u.email === user?.email);

        if (!localUser || !isAdmin(localUser)) {
          document.body.innerHTML = '<div style="padding:60px;text-align:center;"><h2>Access Denied</h2><p>Admin access required.</p><button class="btn" onclick="window.location.href=\'index.html\'">Go to Main Site</button></div>';
          return;
        }

        const data = await loadAllData();
        renderStats(data);
        renderPanes(data);
      } catch(e) {
        console.error('Admin init error:', e);
        showToast('Error loading admin panel', 'error');
      }
    }

    init();
  </script>
</body>
</html>
