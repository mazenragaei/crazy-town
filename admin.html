<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Crazy Town</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --text:#fff; --muted:#9ca3af; --line:#2a2a42; --accent:#00c2ff; --ok:#22c55e; --warn:#f59e0b; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { 
      margin:0; font-family: 'Rajdhani', sans-serif; 
      background: #0d1024; color: var(--text); 
    }
    .wrap { width: min(1300px, 96vw); margin: 24px auto; }
    .top { 
      display:flex; justify-content:space-between; align-items:center; 
      background: var(--card); border: 1px solid var(--line); padding: 15px 24px; border-radius: 12px; margin-bottom: 20px;
    }
    .btn { 
      border:1px solid var(--line); background:#151528; color:#fff; padding:10px 16px; border-radius:8px; 
      cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:8px;
    }
    .btn:hover { background: #1b1b34; border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--line); padding: 20px; border-radius: 12px; }
    .stat-card .small { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card h2 { margin: 5px 0 0; font-size: 2rem; color: var(--accent); }

    .tabs { display:flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px; overflow-x: auto; }
    .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: 1px solid transparent; color: var(--muted); font-weight: 600; white-space: nowrap; }
    .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    
    .pane { display: none; }
    .pane.active { display: block; }
    
    .table-wrap { overflow: auto; background: var(--card); border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--line); }
    th { background: rgba(255,255,255,0.03); color: var(--muted); font-size: 0.85rem; text-transform: uppercase; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { padding: 4px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: 700; }
    .badge-ok { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
    .badge-warn { background: rgba(245,158,11,0.1); color: #fcd34d; border: 1px solid rgba(245,158,11,0.2); }
    
    .actions { display: flex; gap: 8px; }
    
    #loadingOverlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 3000;
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;
    }
  </style>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body style="opacity: 0;"> <!-- Hidden until guard passes -->

  <div id="loadingOverlay">
    <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--accent);"></i>
    <p>Authorizing access...</p>
  </div>

  <div class="wrap">
    <div class="top">
      <div style="display: flex; align-items: center; gap: 15px;">
        <h1 style="margin:0; font-size: 1.5rem;">Admin Panel</h1>
        <div class="badge badge-ok">Connected</div>
      </div>
      <div class="actions">
        <a href="index.html" class="btn"><i class="fas fa-home"></i> Website</a>
        <button onclick="logout()" class="btn" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
      </div>
    </div>

    <div class="grid">
      <div class="stat-card"><div class="small">Total Users</div><h2 id="totalUsers">0</h2></div>
      <div class="stat-card"><div class="small">Total Bookings</div><h2 id="totalBookings">0</h2></div>
      <div class="stat-card"><div class="small">Revenue</div><h2 id="totalRevenue">0 EGP</h2></div>
      <div class="stat-card"><div class="small">Pending</div><h2 id="pendingBookings">0</h2></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('users', this)">Users</div>
      <div class="tab" onclick="switchTab('bookings', this)">Bookings</div>
      <div class="tab" onclick="switchTab('orders', this)">Shop Orders</div>
      <div class="tab" onclick="switchTab('settings', this)">Settings</div>
    </div>

    <!-- Users Pane -->
    <div id="pane-users" class="pane active">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Email / Phone</th><th>Roles</th><th>Balance</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Bookings Pane -->
    <div id="pane-bookings" class="pane">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Ticket ID</th><th>User</th><th>Mission</th><th>Date/Time</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="bookingsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders Pane -->
    <div id="pane-orders" class="pane">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>User</th><th>Total</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://gldwdwcpzcxcvqpcpiol.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZHdkd2NwemN4Y3ZxcGNwaW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjE4NjAsImV4cCI6MjA5Mjg5Nzg2MH0.clwYiXpRG-2ZPC_WmGC56DdoVEiyVu2RgVe5yppxJ2E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function checkAuth() {
      const sessionId = sessionStorage.getItem('crazyTown_session');
      if (!sessionId) {
        alert('Please login first');
        location.href = 'index.html';
        return;
      }

      const { data: user, error } = await supabaseClient.from('users').select('*').eq('id', sessionId).maybeSingle();
      
      if (!user || (!user.roles?.some(r => ['admin', 'owner', 'ceo', 'hr'].includes(r)))) {
        alert('Access denied. Administrator privileges required.');
        location.href = 'index.html';
        return;
      }

      currentUser = user;
      document.body.style.opacity = '1';
      document.getElementById('loadingOverlay').classList.add('hidden');
      loadAllData();
    }

    async function loadAllData() {
      // Load Users
      const { data: users } = await supabaseClient.from('users').select('*').order('joined', { ascending: false });
      renderUsers(users || []);

      // Load Bookings
      const { data: bookings } = await supabaseClient.from('bookings').select('*').order('createdAt', { ascending: false });
      renderBookings(bookings || []);

      // Load Orders
      const { data: orders } = await supabaseClient.from('orders').select('*').order('createdAt', { ascending: false });
      renderOrders(orders || []);

      updateStats(users || [], bookings || [], orders || []);
    }

    function renderUsers(users) {
      const body = document.getElementById('usersTableBody');
      body.innerHTML = users.map(u => `
        <tr>
          <td>
            <strong>${u.name}</strong><br>
            <span style="font-size: 0.75rem; opacity: 0.5;">ID: ${u.id}</span>
          </td>
          <td>${u.email || '-'}<br>${u.phone || '-'}</td>
          <td>${(u.roles || []).map(r => `<span class="badge badge-ok" style="margin-right: 4px;">${r}</span>`).join('')}</td>
          <td>${Number(u.balance || 0).toFixed(0)} EGP</td>
          <td>
            <button onclick="toggleRole('${u.id}', 'vip')" class="btn" style="padding: 5px 10px;">VIP</button>
            <button onclick="toggleRole('${u.id}', 'admin')" class="btn" style="padding: 5px 10px;">Admin</button>
            <button onclick="adjustBalance('${u.id}')" class="btn" style="padding: 5px 10px;">EGP</button>
          </td>
        </tr>
      `).join('');
    }

    function renderBookings(bookings) {
      const body = document.getElementById('bookingsTableBody');
      body.innerHTML = bookings.map(b => `
        <tr>
          <td>${b.ticketId}</td>
          <td>${b.name}</td>
          <td>${b.mission}</td>
          <td>${b.date} ${b.time}</td>
          <td><span class="badge ${b.status === 'Confirmed' ? 'badge-ok' : 'badge-warn'}">${b.status}</span></td>
          <td>
            <button onclick="confirmBooking('${b.id}')" class="btn btn-primary" style="padding: 5px 10px;">Confirm</button>
            <button onclick="deleteBooking('${b.id}')" class="btn" style="padding: 5px 10px; color: var(--danger);"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
    }

    function renderOrders(orders) {
      const body = document.getElementById('ordersTableBody');
      body.innerHTML = orders.map(o => `
        <tr>
          <td>${o.id}</td>
          <td>${o.userId}</td>
          <td>${o.total} EGP</td>
          <td>${o.status}</td>
          <td><button class="btn">View</button></td>
        </tr>
      `).join('');
    }

    function updateStats(users, bookings, orders) {
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('totalBookings').textContent = bookings.length;
      document.getElementById('pendingBookings').textContent = bookings.filter(b => b.status === 'Pending').length;
      const revenue = bookings.reduce((sum, b) => sum + (Number(b.price) || 0), 0);
      document.getElementById('totalRevenue').textContent = `${revenue.toFixed(0)} EGP`;
    }

    function switchTab(paneId, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(`pane-${paneId}`).classList.add('active');
    }

    async function toggleRole(userId, role) {
      if (userId === 'root-admin') return alert('Cannot modify Root');
      const { data: user } = await supabaseClient.from('users').select('roles').eq('id', userId).single();
      let roles = user.roles || [];
      if (roles.includes(role)) roles = roles.filter(r => r !== role);
      else roles.push(role);
      
      const { error } = await supabaseClient.from('users').update({ roles }).eq('id', userId);
      if (!error) loadAllData();
    }

    async function adjustBalance(userId) {
      const amount = prompt('Amount to add (e.g. 500 or -200):');
      if (amount === null) return;
      const { data: user } = await supabaseClient.from('users').select('balance').eq('id', userId).single();
      const next = (Number(user.balance) || 0) + Number(amount);
      await supabaseClient.from('users').update({ balance: next }).eq('id', userId);
      loadAllData();
    }

    async function confirmBooking(id) {
      await supabaseClient.from('bookings').update({ status: 'Confirmed' }).eq('id', id);
      loadAllData();
    }

    async function deleteBooking(id) {
       if (confirm('Delete this booking?')) {
         await supabaseClient.from('bookings').delete().eq('id', id);
         loadAllData();
       }
    }

    function logout() { sessionStorage.removeItem('crazyTown_session'); location.href = 'index.html'; }

    // Real-time updates
    supabaseClient.channel('admin-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'users' }, loadAllData)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' }, loadAllData)
      .subscribe();

    checkAuth();
  </script>
</body>
</html>
