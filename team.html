<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Hub - Crazy Town</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --line:#2a2a42; --text:#fff; --muted:#9ca3af; --accent:#00c2ff; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: 'Rajdhani', sans-serif; }
    .wrap { width:min(1200px,95vw); margin: 30px auto; }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px; }
    .btn { border:1px solid var(--line); background:#151528; color:#fff; padding:12px 24px; border-radius:10px; cursor:pointer; text-decoration:none; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:25px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>My Team Hub</h1>
      <a href="index.html" class="btn">Back to City</a>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Team Info</h3>
        <p id="teamName" style="font-size: 1.5rem; color: var(--accent); margin: 10px 0;">NO TEAM YET</p>
        <p style="color: var(--muted); font-size: 0.8rem;">You must join or create a team to compete in championships.</p>
      </div>

      <div class="card">
        <h3>Manage Team</h3>
        <div style="margin-top: 15px;">
           <input type="text" id="newTeamName" placeholder="Enter team name" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--line); border-radius: 8px; color: #fff; margin-bottom: 10px;">
           <button class="btn" style="width: 100%; background: var(--accent); color: #000; font-weight: 700;" onclick="createTeam()">Create Squad</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://gldwdwcpzcxcvqpcpiol.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZHdkd2NwemN4Y3ZxcGNwaW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjE4NjAsImV4cCI6MjA5Mjg5Nzg2MH0.clwYiXpRG-2ZPC_WmGC56DdoVEiyVu2RgVe5yppxJ2E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadTeam() {
      const sid = sessionStorage.getItem('crazyTown_session');
      if (!sid) { location.href = 'index.html'; return; }
      const { data: team } = await supabaseClient.from('teams').select('*').contains('members', [sid]).maybeSingle();
      if (team) {
        document.getElementById('teamName').textContent = team.name.toUpperCase();
      }
    }

    async function createTeam() {
      const name = document.getElementById('newTeamName').value.trim();
      const sid = sessionStorage.getItem('crazyTown_session');
      if (!name || !sid) return;

      const { error } = await supabaseClient.from('teams').insert([{
        id: 'team-' + Date.now(),
        name: name,
        captainId: sid,
        members: [sid]
      }]);

      if (!error) { alert('Team created!'); loadTeam(); }
      else { alert('Error: Team name might be taken or connection lost.'); }
    }

    loadTeam();
  </script>
</body>
</html>
