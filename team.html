<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Team Hub - Crazy Town</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --line:#2a2a42; --text:#fff; --muted:#9ca3af; --accent:#00c2ff; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: Arial, sans-serif; }
    .wrap { width:min(1200px,95vw); margin:24px auto; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid var(--line); background:#151528; color:#fff; padding:10px 12px; border-radius:10px; cursor:pointer; text-decoration:none; display:inline-block; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:12px; margin-top:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; }
    .member { display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
    .avatar { width:42px; height:42px; border-radius:50%; background:#334155; display:flex; align-items:center; justify-content:center; font-weight:700; overflow:hidden; }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    table { width:100%; border-collapse:collapse; }
    th, td { border-bottom:1px solid var(--line); text-align:left; padding:10px; }
    .small { color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>My Team Hub</h1>
      <div>
        <a class="btn" href="index.html">Main Website</a>
        <a class="btn" href="operations.html">Operations Center</a>
        <a class="btn" href="support.html">Support</a>
        <a class="btn" href="admin.html">Admin Panel</a>
      </div>
    </div>

    <div class="grid">
      <div class="card"><div class="small">Team Name</div><h2 id="teamNameValue">-</h2></div>
      <div class="card"><div class="small">Captain</div><h2 id="teamCaptainValue">-</h2></div>
      <div class="card"><div class="small">Members Count</div><h2 id="teamMembersCount">0</h2></div>
      <div class="card"><div class="small">Tournament Registrations</div><h2 id="teamRegistrationsCount">0</h2></div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h3>Team Members</h3>
      <div id="teamActions" style="margin-bottom:10px;"></div>
      <div id="membersList"></div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h3>Members Stats</h3>
      <div style="overflow:auto;">
        <table id="statsTable"></table>
      </div>
    </div>

    <div class="card" style="margin-top:14px;">
      <h3>Tournament History</h3>
      <div style="overflow:auto;">
        <table id="tournamentTable"></table>
      </div>
    </div>
  </div>

  <script type="module">
    import { getCurrentUser, getKV, setKV } from './db.js';

    const K = { users:'crazyTown_users', session:'crazyTown_session', teams:'crazyTown_teams', tournamentRegs:'crazyTown_tournament_regs' };

    // Safe array wrapper - prevents "n.unshift is not a function" errors
    function safeArray(val, fallback = []) {
      if (Array.isArray(val)) return val;
      return fallback;
    }

    async function ro(k, d) { try { return await getKV(k, d); } catch { return d; } }
    async function so(k, v) { try { await setKV(k, v); } catch (e) { console.error('Save error:', e); } }

    async function me() {
      try {
        const current = await getCurrentUser();
        if (!current) return null;
        const users = await ro(K.users, []);
        return users.find((u) => String(u.email) === String(current.email)) || null;
      } catch { return null; }
    }

    const isAdmin = (user) => Array.isArray(user?.roles) && user.roles.includes('admin');

    async function getTeamForUser(userId) {
      return (await ro(K.teams, [])).find((t) => (t.members || []).includes(userId)) || null;
    }

    async function getManagedTeam(user) {
      const teams = await ro(K.teams, []);
      if (isAdmin(user) && adminSelectedTeamId) {
        return teams.find((t) => t.id === adminSelectedTeamId) || null;
      }
      return teams.find((t) => (t.members || []).includes(user.id)) || null;
    }

    async function addMemberToTeam() {
      const user = await me();
      if (!user) return;
      const teams = await ro(K.teams, []);
      const team = await getManagedTeam(user);
      if (!team) return;
      if (!(team.captainId === user.id || isAdmin(user))) return alert('Only leader/admin can add members.');
      const email = document.getElementById('addMemberEmail').value.trim().toLowerCase();
      const users = await ro(K.users, []);
      const target = users.find((u) => u.email === email);
      if (!target) return alert('User not found.');
      if (target.id === user.id) return alert('Cannot add yourself.');
      if (team.members.includes(target.id)) return alert('User already in team.');
      const existingTeam = await getTeamForUser(target.id);
      if (existingTeam) return alert('User already belongs to another team.');
      team.members = team.members || [];
      if (!Array.isArray(team.members)) team.members = [];
      team.members.push(target.id);
      await so(K.teams, teams);
      document.getElementById('addMemberEmail').value = '';
      await render();
    }

    async function leaveTeam() {
      const user = await me();
      if (!user) return;
      const teams = await ro(K.teams, []);
      const team = teams.find((t) => (t.members || []).includes(user.id));
      if (!team) return;
      if (team.captainId === user.id) return alert('Leader cannot leave before transferring leadership or deleting the team.');
      team.members = (team.members || []).filter((id) => id !== user.id);
      await so(K.teams, teams);
      await render();
    }

    async function removeMember(memberId) {
      const user = await me();
      if (!user) return;
      const teams = await ro(K.teams, []);
      const team = await getManagedTeam(user);
      if (!team) return;
      if (!(team.captainId === user.id || isAdmin(user))) return alert('Only leader/admin can remove members.');
      if (memberId === team.captainId) return alert('Cannot remove current leader.');
      team.members = (team.members || []).filter((id) => id !== memberId);
      await so(K.teams, teams);
      await render();
    }

    async function transferLeadership(newLeaderId) {
      const user = await me();
      if (!user) return;
      const teams = await ro(K.teams, []);
      const team = await getManagedTeam(user);
      if (!team) return;
      if (!(team.captainId === user.id || isAdmin(user))) return alert('Only leader/admin can transfer leadership.');
      if (!team.members.includes(newLeaderId)) return;
      team.captainId = newLeaderId;
      await so(K.teams, teams);
      await render();
    }

    async function deleteMyTeam() {
      const user = await me();
      if (!user) return;
      const teams = await ro(K.teams, []);
      const team = await getManagedTeam(user);
      if (!team) return;
      if (!(team.captainId === user.id || isAdmin(user))) return alert('Only leader/admin can delete team.');
      const filteredTeams = teams.filter((t) => t.id !== team.id);
      await so(K.teams, filteredTeams);
      await so(K.tournamentRegs, (await ro(K.tournamentRegs, [])).filter((r) => r.teamId !== team.id));
      await render();
    }

    let adminSelectedTeamId = '';

    async function selectAdminTeam() {
      const select = document.getElementById('adminTeamSelect');
      adminSelectedTeamId = select ? select.value : '';
      await render();
    }

    async function render() {
      const user = await me();
      if (!user) return location.href = 'index.html';
      const users = await ro(K.users, []);
      const usersMap = new Map(users.map((u) => [u.id, u]));
      const teams = await ro(K.teams, []);
      let team = teams.find((t) => (t.members || []).includes(user.id));
      if (!team && isAdmin(user) && teams.length) {
        if (!adminSelectedTeamId) adminSelectedTeamId = teams[0].id;
        team = teams.find((t) => t.id === adminSelectedTeamId) || teams[0];
      }
      if (!team) {
        document.getElementById('teamNameValue').textContent = 'No Team Yet';
        document.getElementById('membersList').innerHTML = '<div class="small">You are not a member in any team.</div>';
        document.getElementById('statsTable').innerHTML = '<tbody><tr><td class="small">No team stats available.</td></tr></tbody>';
        document.getElementById('tournamentTable').innerHTML = '<tbody><tr><td class="small">No tournament registrations yet.</td></tr></tbody>';
        document.getElementById('teamActions').innerHTML = '';
        return;
      }

      document.getElementById('teamNameValue').textContent = team.name;
      document.getElementById('teamCaptainValue').textContent = usersMap.get(team.captainId)?.name || 'Unknown';
      document.getElementById('teamMembersCount').textContent = (team.members || []).length;

      const isLeader = team.captainId === user.id;
      const actions = document.getElementById('teamActions');
      const adminTeamPicker = isAdmin(user) ? `
        <div style="margin-bottom:8px;">
          <select id="adminTeamSelect" onchange="selectAdminTeam()" style="background:#121226; color:#fff; border:1px solid var(--line); border-radius:8px; padding:8px;">
            ${teams.map((t) => `<option value="${t.id}" ${t.id === team.id ? 'selected' : ''}>Manage: ${t.name}</option>`).join('')}
          </select>
        </div>
      ` : '';
      actions.innerHTML = `
        ${adminTeamPicker}
        ${isLeader ? `
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input id="addMemberEmail" placeholder="Add member by email" style="flex:1; min-width:220px; background:#121226; color:#fff; border:1px solid var(--line); border-radius:8px; padding:8px;">
            <button class="btn" onclick="addMemberToTeam()">Add Member</button>
            <button class="btn" onclick="deleteMyTeam()">Delete Team</button>
          </div>
        ` : (isAdmin(user) ? '<button class="btn" onclick="deleteMyTeam()">Delete Team</button>' : '<button class="btn" onclick="leaveTeam()">Leave Team</button>')}
      `;

      const regs = (await ro(K.tournamentRegs, [])).filter((r) => r.teamId === team.id);
      document.getElementById('teamRegistrationsCount').textContent = regs.length;

      document.getElementById('membersList').innerHTML = (team.members || []).map((memberId) => {
        const member = usersMap.get(memberId);
        if (!member) return '';
        const avatar = member.profileImage ? `<img src="${member.profileImage}" alt="${member.name}">` : member.name.charAt(0).toUpperCase();
        const controls = (isLeader || isAdmin(user))
          ? `<div style="margin-top:6px;">
              ${memberId !== team.captainId ? `<button class="btn" onclick="transferLeadership('${memberId}')">Make Leader</button> <button class="btn" onclick="removeMember('${memberId}')">Remove</button>` : '<span class="small">Current Leader</span>'}
            </div>`
          : '';
        return `<div class="member">
          <div class="avatar">${avatar}</div>
          <div><strong>${member.name}</strong><br><span class="small">${(member.roles || []).join(' / ') || 'member'}</span>${controls}</div>
        </div>`;
      }).join('');

      const members = (team.members || []).map((id) => usersMap.get(id)).filter(Boolean);
      document.getElementById('statsTable').innerHTML = `
        <thead><tr><th>Player</th><th>Skill</th><th>Points</th><th>Matches</th><th>Badges</th></tr></thead>
        <tbody>
          ${members.map((member) => `<tr>
            <td>${member.name}</td>
            <td>${member.skill || 'Bronze'}</td>
            <td>${member.points || 0}</td>
            <td>${member.matches || 0}</td>
            <td>${(member.badges || []).join(', ') || '-'}</td>
          </tr>`).join('')}
        </tbody>
      `;

      document.getElementById('tournamentTable').innerHTML = `
        <thead><tr><th>Tournament</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${regs.length ? regs.map((reg) => `<tr><td>${reg.tournamentName}</td><td>${reg.status}</td><td>${new Date(reg.createdAt).toLocaleDateString()}</td></tr>`).join('') : '<tr><td colspan="3">No registrations yet.</td></tr>'}
        </tbody>
      `;
    }

    window.addMemberToTeam = addMemberToTeam;
    window.leaveTeam = leaveTeam;
    window.removeMember = removeMember;
    window.transferLeadership = transferLeadership;
    window.deleteMyTeam = deleteMyTeam;
    window.selectAdminTeam = selectAdminTeam;

    render();
  </script>
</body>
</html>
