<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Center - Crazy Town</title>
  <style>
    :root { --bg:#0f0f23; --card:#1a1a2e; --line:#2a2a42; --text:#fff; --muted:#9ca3af; --accent:#00c2ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { width:min(1150px,95vw); margin:24px auto; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
    .btn { border:1px solid var(--line); background:#151528; color:#fff; padding:10px 12px; border-radius:10px; cursor:pointer; text-decoration:none; display:inline-block; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px; margin-top:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; }
    .small { color:var(--muted); font-size:12px; }
    .row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin:10px 0; }
    input, select, textarea { width:100%; background:#121226; color:#fff; border:1px solid var(--line); border-radius:8px; padding:8px; }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th, td { border-bottom:1px solid var(--line); text-align:left; padding:10px; font-size:14px; }
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:12px; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Support Center</h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" onclick="goBack()">&larr; Back</button>
        <a class="btn" href="index.html">Main Website</a>
        <a class="btn" href="operations.html">Operations</a>
        <a class="btn" href="vip.html">VIP</a>
      </div>
    </div>

    <div class="grid">
      <div class="card"><div class="small">My Open Tickets</div><h2 id="openTicketsCount">0</h2></div>
      <div class="card"><div class="small">Resolved Tickets</div><h2 id="resolvedTicketsCount">0</h2></div>
      <div class="card"><div class="small">Last Ticket Status</div><h2 id="lastTicketStatus">-</h2></div>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3 style="margin-top:0;">Create Support Ticket</h3>
      <form onsubmit="submitTicket(event)">
        <div class="row">
          <select id="ticketCategory" required>
            <option value="">Category</option>
            <option>Booking Issue</option>
            <option>Payment Issue</option>
            <option>VIP Issue</option>
            <option>Operations Issue</option>
            <option>Account Issue</option>
          </select>
          <select id="ticketPriority" required>
            <option value="">Priority</option>
            <option>Normal</option>
            <option>High</option>
            <option>Urgent</option>
          </select>
        </div>
        <input id="ticketSubject" placeholder="Subject" required>
        <textarea id="ticketMessage" rows="4" placeholder="Describe your issue..." required></textarea>
        <div style="margin-top:10px;">
          <button class="btn" type="submit">Submit Ticket</button>
        </div>
      </form>
    </div>

    <div class="card" style="margin-top:12px;">
      <h3 style="margin-top:0;">My Tickets</h3>
      <div class="table-wrap"><table id="ticketsTable"></table></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const K = { session: 'crazyTown_session' };
    const SUPABASE_URL = 'https://gldwdwcpzcxcvqpcpiol.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZHdkd2NwemN4Y3ZxcGNwaW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjE4NjAsImV4cCI6MjA5Mjg5Nzg2MH0.clwYiXpRG-2ZPC_WmGC56DdoVEiyVu2RgVe5yppxJ2E';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function readSessionId() { return sessionStorage.getItem(K.session) || localStorage.getItem(K.session) || ''; }

    let currentUser = null;
    let myTickets = [];

    async function loadUser() {
      const sid = readSessionId();
      if (!sid) { currentUser = null; return null; }
      const { data, error } = await supabaseClient.from('users').select('*').eq('id', sid).maybeSingle();
      if (error) { console.warn('support load user', error); currentUser = null; return null; }
      currentUser = data;
      return currentUser;
    }

    async function loadTickets() {
      if (!currentUser) { myTickets = []; return; }
      const { data, error } = await supabaseClient.from('support_tickets').select('*').eq('userId', currentUser.id).order('createdAt', { ascending: false });
      if (error) { console.warn('support tickets', error); myTickets = []; return; }
      myTickets = Array.isArray(data) ? data : [];
    }

    function goBack() {
      if (window.history.length > 1) return window.history.back();
      location.href = 'index.html';
    }

    async function submitTicket(event) {
      event.preventDefault();
      await loadUser();
      if (!currentUser) return (location.href = 'index.html');
      const category = document.getElementById('ticketCategory').value;
      const priority = document.getElementById('ticketPriority').value;
      const subject = document.getElementById('ticketSubject').value.trim();
      const message = document.getElementById('ticketMessage').value.trim();
      if (!category || !priority || !subject || !message) return;
      const id = `T-${Date.now()}`;
      const createdAt = new Date().toISOString();
      const row = {
        id,
        userId: currentUser.id,
        userName: currentUser.name,
        category,
        priority,
        message: `Subject: ${subject}\n\n${message}`,
        status: 'Open',
        createdAt
      };
      const { error } = await supabaseClient.from('support_tickets').insert([row]);
      if (error) {
        console.error(error);
        alert('Could not submit ticket. Check Supabase table support_tickets and RLS policies.');
        return;
      }
      event.target.reset();
      await loadTickets();
      render();
    }

    function subjectFromMessage(msg) {
      const m = String(msg || '').match(/^Subject:\s*(.+?)(?:\n\n|$)/s);
      return m ? m[1].trim() : '';
    }

    function bodyFromMessage(msg) {
      const s = String(msg || '');
      return s.replace(/^Subject:\s*.+?\n\n/s, '').trim() || s;
    }

    function render() {
      if (!currentUser) return (location.href = 'index.html');
      const mine = myTickets.filter((t) => String(t.userId) === String(currentUser.id));
      const openCount = mine.filter((t) => !['Resolved', 'Closed'].includes(t.status || 'Open')).length;
      const resolvedCount = mine.filter((t) => ['Resolved', 'Closed'].includes(t.status || 'Open')).length;
      document.getElementById('openTicketsCount').textContent = openCount;
      document.getElementById('resolvedTicketsCount').textContent = resolvedCount;
      document.getElementById('lastTicketStatus').textContent = mine[0] ? mine[0].status : '-';
      document.getElementById('ticketsTable').innerHTML = `
        <thead><tr><th>Ticket</th><th>Category</th><th>Priority</th><th>Subject</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${mine.length ? mine.map((t) => {
          const subj = subjectFromMessage(t.message) || '(no subject)';
          const body = bodyFromMessage(t.message);
          return `
          <tr>
            <td>${t.id}</td>
            <td>${t.category}</td>
            <td>${t.priority}</td>
            <td>${subj}<br><span class="small">${body}</span></td>
            <td>${t.status || 'Open'}</td>
            <td>${new Date(t.createdAt).toLocaleString()}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="6">No tickets yet.</td></tr>'}</tbody>`;
    }

    async function init() {
      await loadUser();
      if (!currentUser) return (location.href = 'index.html');
      await loadTickets();
      render();
      supabaseClient
        .channel('support-my-tickets')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'support_tickets' }, async () => {
          await loadTickets();
          render();
        })
        .subscribe();
    }

    init();
  </script>
</body>
</html>
