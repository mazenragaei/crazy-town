<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Crazy Town</title>
  <style>
    :root { --bg:#0a0a0f; --card:#111a2f; --line:#243252; --text:#fff; --muted:#9ca3af; --accent:#00c2ff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); }
    .wrap { width: min(800px, 95vw); margin: 50px auto; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 40px; }
    input, textarea, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid var(--line); border-radius: 10px; color: #fff; margin-bottom: 20px; }
    .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; font-weight: 700; border-radius: 10px; cursor: pointer; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin-bottom: 10px;">Support Center</h1>
      <p style="color: var(--muted); margin-bottom: 30px;">How can we help you today, Operative?</p>
      
      <form onsubmit="handleSubmit(event)">
        <label style="display: block; margin-bottom: 8px;">Subject</label>
        <select id="supportCategory">
           <option>Booking Issue</option>
           <option>Payment Issue</option>
           <option>Technical Problem</option>
           <option>VIP Feedback</option>
        </select>

        <label style="display: block; margin-bottom: 8px;">Message</label>
        <textarea id="supportMessage" rows="5" placeholder="Describe your issue in detail..."></textarea>
        
        <button type="submit" class="btn">Submit Ticket</button>
      </form>
      <a href="index.html" style="display: block; text-align: center; margin-top: 20px; color: var(--muted);">Back to Website</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://gldwdwcpzcxcvqpcpiol.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZHdkd2NwemN4Y3ZxcGNwaW9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjE4NjAsImV4cCI6MjA5Mjg5Nzg2MH0.clwYiXpRG-2ZPC_WmGC56DdoVEiyVu2RgVe5yppxJ2E';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleSubmit(e) {
      e.preventDefault();
      const sid = sessionStorage.getItem('crazyTown_session');
      if (!sid) { alert('Sign in required'); return; }

      const row = {
        id: 'T-' + Date.now(),
        userId: sid,
        category: document.getElementById('supportCategory').value,
        message: document.getElementById('supportMessage').value,
        status: 'Open',
        createdAt: new Date().toISOString()
      };

      const { error } = await supabaseClient.from('support_tickets').insert([row]);
      if (!error) {
        alert('Ticket submitted successfully! We will contact you soon.');
        location.href = 'index.html';
      } else {
        alert('Submission failed. Check connection.');
      }
    }
  </script>
</body>
</html>
